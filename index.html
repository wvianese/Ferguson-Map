<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Ferguson Housing Analysis - Interactive Map</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: system-ui, -apple-system, sans-serif;
            background: #2c3e50;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }
        .container {
            text-align: center;
            color: white;
            padding: 40px;
        }
        h1 {
            font-size: 2.5em;
            margin-bottom: 20px;
        }
        p {
            font-size: 1.2em;
            margin-bottom: 30px;
            color: #ecf0f1;
        }
        .btn {
            display: inline-block;
            padding: 15px 40px;
            background: #3498db;
            color: white;
            text-decoration: none;
            border-radius: 8px;
            font-size: 1.1em;
            font-weight: 600;
            transition: background 0.3s;
        }
        .btn:hover {
            background: #2980b9;
        }
        .info {
            margin-top: 40px;
            padding-top: 40px;
            border-top: 1px solid rgba(255,255,255,0.2);
            font-size: 0.9em;
            color: #95a5a6;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Ferguson Housing Analysis</h1>
        <p>Interactive risk assessment map • 8,877 parcels analyzed</p>
        <a href="ferguson_map.html" class="btn">View Interactive Map →</a>
        <div class="info">
            Comprehensive analysis combining computer vision, machine learning,<br>
            and statistical modeling to identify housing abandonment risk.
        </div>
    </div>
    <script>
        (function startMapWarmup() {
            if (!('caches' in window)) return;

            const cacheName = 'ferguson-map-data-v4';
            const preloadOrder = ['ensemble', 'confirmed', 'ml', 'cv', 'occ', 'risk', 'value', 'age', 'critical'];
            const concurrency = 3;
            let nextIndex = 0;

            async function worker(cache) {
                while (nextIndex < preloadOrder.length) {
                    const layer = preloadOrder[nextIndex];
                    nextIndex += 1;
                    const url = `map_data/${layer}.json`;
                    try {
                        const existing = await cache.match(url);
                        if (existing && existing.ok) continue;
                        const response = await fetch(url, { cache: 'default' });
                        if (response.ok) {
                            await cache.put(url, response.clone());
                        }
                    } catch (err) {
                        // Keep warmup silent; runtime loader handles retries.
                        console.error(err);
                    }
                }
            }

            window.addEventListener('load', async () => {
                try {
                    const cache = await caches.open(cacheName);
                    const workers = Array.from({ length: Math.min(concurrency, preloadOrder.length) }, () => worker(cache));
                    await Promise.all(workers);
                } catch (err) {
                    console.error(err);
                }
            });
        })();
    </script>
</body>
</html>
